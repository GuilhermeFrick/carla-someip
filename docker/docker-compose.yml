version: '3.9'

# Todos os servicos usam host network para simplificar SOME/IP multicast e CARLA TCP
# CARLA server: localhost:2000-2002
# ecu_bridge:   localhost:5000
# SOME/IP:      239.0.0.1:30490 (multicast na rede do host)

services:

  # ── CARLA Simulator ────────────────────────────────────────────────────────
  carla_server:
    image: carlasim/carla:0.9.15
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    command: bash /home/carla/CarlaUE4.sh -RenderOffScreen -nosound -carla-port=2000
    restart: on-failure

  # ── Bridge TCP→SOME/IP ─────────────────────────────────────────────────────
  ecu_bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ecu
    container_name: ecu_bridge
    command: python -m someip_network.bridge
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
    restart: on-failure

  # ── CARLA Client (coleta sensores, publica telemetria) ─────────────────────
  carla_client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: carla_client
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - SDL_VIDEODRIVER=dummy
    command: python3 carla_client.py --headless --duration 300 --npcs 30
    depends_on:
      - carla_server
      - ecu_bridge
    restart: on-failure

  # ── IDS Monitor ────────────────────────────────────────────────────────────
  ids_monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ids
    container_name: ids_monitor
    profiles: ["ids"]
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../traffic_logs:/app/traffic_logs

  # ── Atacante ───────────────────────────────────────────────────────────────
  attacker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ecu
    container_name: attacker
    profiles: ["attack"]
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
    command: python attacks/spoof.py --mode suppress --duration 60
    restart: "no"
